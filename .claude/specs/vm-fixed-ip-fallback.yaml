            note: "Current fixed path hard-requires vm_network_name."
          - path: "/Users/zhangqihang/MyWork/workrc/rainbond/worker/appm/conversion/version.go:1322-1378"
            note: "Current annotation logic only looks at pod_ip."

      - id: "task-1.2"
        name: "Implement Go fallback path and capability change"
        status: "pending"
        files:
          modify:
            - path: "/Users/zhangqihang/MyWork/workrc/rainbond/worker/appm/conversion/vm_runtime.go"
