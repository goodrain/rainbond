            - path: "/Users/zhangqihang/MyWork/workrc/rainbond/worker/appm/conversion/version.go"
              lines: "1322-1378"
            - path: "/Users/zhangqihang/MyWork/workrc/rainbond/api/handler/vm_capability.go"
              lines: "47-66"
            - path: "/Users/zhangqihang/MyWork/workrc/rainbond/api/handler/vm_capability_test.go"
              lines: "1-160"
        steps:
          - action: "write-test"
            description: "Adjust capabilities tests to require fixed mode even when no business networks are present."
            run: "go test ./api/handler -run 'TestBuildVMCapabilitiesWithoutOptionalResources' -v"
            expect: "FAIL"
          - action: "implement"
            description: "Return fixed mode unconditionally, keep networks optional, and wire VM annotations to fixed_ip when network_name is empty."
            run: "go test ./api/handler -run 'TestBuildVMCapabilities|TestBuildVMCapabilitiesWithoutOptionalResources|TestBuildVMCapabilitiesSortsAndDeduplicates' -v"
            expect: "PASS"
        acceptance:
